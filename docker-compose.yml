services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=ai_agent
      - HISTORY_MAX_MESSAGES=${HISTORY_MAX_MESSAGES:-0}
      - HISTORY_SUMMARY_PROMPT_FILE=${HISTORY_SUMMARY_PROMPT_FILE:-}
      - STICKY_FACTS_WINDOW_SIZE=${STICKY_FACTS_WINDOW_SIZE:-10}
      - STICKY_FACTS_EXTRACTION_PROMPT_FILE=${STICKY_FACTS_EXTRACTION_PROMPT_FILE:-}
      - FSM_CONFIG_PATH=${FSM_CONFIG_PATH:-}
      # Agent type configuration
      - AGENT_TYPE=${AGENT_TYPE:-gigachat}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama2}
      # Knowledge base configuration
      - KNOWLEDGE_BASE_ENABLED=${KNOWLEDGE_BASE_ENABLED:-false}
      - KNOWLEDGE_BASE_SQLITE_PATH=${KNOWLEDGE_BASE_SQLITE_PATH:-/app/data/knowledge.db}
      - KNOWLEDGE_BASE_FAISS_PATH=${KNOWLEDGE_BASE_FAISS_PATH:-/app/data/faiss.index}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - KNOWLEDGE_BASE_K=${KNOWLEDGE_BASE_K:-5}
      - KNOWLEDGE_BASE_RELEVANCE_THRESHOLD=${KNOWLEDGE_BASE_RELEVANCE_THRESHOLD:-0.8}
      - KNOWLEDGE_BASE_MAX_CHUNKS=${KNOWLEDGE_BASE_MAX_CHUNKS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./static:/app/static
      - ./prompts:/app/prompts
      - ./config:/app/config
      - ./knowledge_data:/app/data
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=ai_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network

volumes:
  postgres_data:
  pgadmin_data:
  knowledge_data:

networks:
  app_network:
    driver: bridge