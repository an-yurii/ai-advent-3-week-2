# Finite State Machine Configuration for Travel Planning Assistant
# This file defines states, transitions, and validation rules for the travel planning workflow

fsm_config:
  initial_state: defining_goals
  max_attempts: 20
  validation_prompt_file: /app/prompts/validation_prompt.md

  states:
    # State 1: Defining travel goals and purpose
    defining_goals:
      step_number: 1
      description: Определение целей и задач путешествия
      instructions: >
        Запроси у пользователя цель путешествия (отдых, бизнес, обучение, лечение и т. д.),
        предпочтительный тип отдыха (пляжный, активный, экскурсионный, гастрономический и т. д.),
        количество путешественников и их возрастные группы. Если пользователь не указал сроки
        поездки, запроси желаемые даты или период. В конце уточни бюджет на всё путешествие.
        Фраза для запроса дополнительной информации: «Нужна дополнительная информация».
      validation_schema:
        check_list:
          - Цель путешествия сформулирована конкретно (отдых/бизнес/обучение/иное)
          - Указан тип отдыха (пляжный/активный/экскурсионный/гастрономический/иное)
          - Указано количество путешественников
          - Для каждого путешественника указана возрастная группа (дети до 7 лет, подростки 8–17 лет, взрослые 18+, пожилые 60+)
          - Указаны желаемые даты или период поездки
          - Бюджет на всё путешествие указан в числовом формате с валютой
      on_success: assessing_interests
      on_fail: defining_goals

    # State 2: Assessing user interests and preferences
    assessing_interests:
      step_number: 2
      description: Выявление интересов и предпочтений путешественника
      instructions: >
        На основе цели и типа отдыха из предыдущего шага запроси у пользователя:
        - Любимые виды активностей (пешие прогулки, водные виды спорта, музеи, шопинг и т. д.)
        - Предпочтения в питании (вегетарианская кухня, местная кухня, фастфуд и т. д.)
        - Требования к размещению (отель, апартаменты, хостел, глэмпинг и т. д., звёздность)
        - Важные критерии выбора места (чистота пляжей, безопасность, наличие развлечений для детей, доступность общественного транспорта)
        - Ограничения (аллергии, диетические ограничения, ограничения по здоровью)
        Если каких‑то данных недостаточно, используй фразу «Нужна дополнительная информация».
      validation_schema:
        check_list:
          - Перечислены минимум 3 вида предпочитаемых активностей
          - Указаны предпочтения в питании или отмечено их отсутствие
          - Заданы требования к размещению с указанием типа и звёздности (если применимо)
          - Выявлены минимум 2 важных критерия выбора места
          - Учтены все ограничения (если есть) или указано, что ограничений нет
      on_success: route_planning
      on_fail: assessing_interests

    # State 3: Route planning and itinerary creation
    route_planning:
      step_number: 3
      description: Планирование маршрута и составление программы путешествия
      instructions: >
        Используя данные о целях, бюджете, датах и интересах из предыдущих шагов:
        1. Предложи 2–3 варианта маршрута с разными городами/локациями, соответствующими интересам пользователя.
        2. Для каждого варианта составь краткий план на каждый день (основные активности, достопримечательности).
        3. Оцени примерную стоимость каждого варианта (проживание, транспорт, входные билеты, питание).
        4. Укажи логистические детали: способы перемещения между локациями, время в пути, рекомендуемые рейсы/поезда.
        5. Добавь рекомендации по бронированию (за сколько дней лучше бронировать билеты и отели).
        Если для расчёта стоимости или построения маршрута не хватает данных, используй фразу «Нужна дополнительная информация».
      validation_schema:
        check_list:
          - Предложено минимум 2 варианта маршрута с разными локациями
          - Для каждого маршрута составлен план на каждый день с указанием активностей
          - Приведена оценка стоимости для каждого варианта с разбивкой по категориям (проживание, транспорт и т. д.)
          - Указаны способы перемещения между локациями и время в пути
          - Даны рекомендации по срокам бронирования
          - Все предложенные локации и активности соответствуют интересам и ограничениям пользователя
      on_success: final_itinerary
      on_fail: route_planning

    # Final State: Final itinerary and document generation
    final_itinerary:
      step_number: 4
      description: Формирование итогового плана путешествия
      instructions: >
        Объедини лучшие элементы из предложенных маршрутов в единый оптимальный план.
        Составь подробный день‑за‑днём itinerary в формате таблицы с колонками:
        «День», «Локация», «Проживание», «Активности», «Транспорт», «Бюджет (руб/валюта)».
        Добавь список полезных контактов (отели, гиды, экстренные службы) и ссылки на бронирование.
      validation_schema:
        check_list:
          - Итоговый маршрут объединяет оптимальные элементы из предыдущих вариантов
          - Таблица itinerary содержит все указанные колонки и заполнена для каждого дня
          - Включены полезные контакты и ссылки на бронирование
      on_success: exit
      on_fail: final_itinerary

# Notes:
# - The 'exit' state is special and triggers task completion (done = true)
# - Validation is performed after each LLM response
# - Step numbers are used for UI display (Шаг X из Y)
# - Total steps count is calculated as number of states with step_number > 0
